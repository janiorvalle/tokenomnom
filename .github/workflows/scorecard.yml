name: Scorecard

# OpenSSF Scorecard requires a public repository. This job stays dormant until
# the repository visibility changes.

on:
  push:
    branches:
      - main
  schedule:
    - cron: "24 6 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: scorecard
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    if: >-
      github.repository == 'janiorvalle/tokenomnom' &&
      github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read # checkout
      security-events: write # SARIF upload to code scanning
      id-token: write # publishing results to the OpenSSF API
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload results to code scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
