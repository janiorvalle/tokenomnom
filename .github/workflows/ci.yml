name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read # checkout
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history: the diff base below must be resolvable without a
          # later (credential-less) fetch, which fails on private repos.
          fetch-depth: 0
          persist-credentials: false
      # Self-owned docs-only filter (replaces dorny/paths-filter): "code"
      # is true unless every changed file is Markdown. Defaults to true
      # whenever the base is unknown (first push, force-push) -- skipping
      # the suite must never be the failure mode.
      - id: filter
        shell: bash
        env:
          BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          code=true
          if [ -n "$BASE" ] && [ "$BASE" != "0000000000000000000000000000000000000000" ] \
            && git cat-file -e "$BASE^{commit}" 2>/dev/null; then
            mapfile -t changed < <(git diff --name-only "$BASE"...HEAD)
            if [ "${#changed[@]}" -gt 0 ]; then
              code=false
              for file in "${changed[@]}"; do
                case "$file" in
                  *.md) ;;
                  *) code=true; break ;;
                esac
              done
            fi
          fi
          echo "code=$code" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - run: make verify

  platform:
    name: Go (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error
      - uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          persona: pedantic
          min-severity: low
          advanced-security: false

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read # checkout
      pull-requests: read # gitleaks scopes pull request commits
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
