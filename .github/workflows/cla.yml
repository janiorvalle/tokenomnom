name: CLA check

on: # zizmor: ignore[dangerous-triggers] CLA writes signatures but never checks out or runs PR code
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions: {}

concurrency:
  group: cla-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  cla:
    name: CLA check
    if: >-
      github.event_name == 'pull_request_target' ||
      github.event.comment.body == 'recheck' ||
      github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write # contributor-assistant updates its workflow state
      contents: write # signatures are committed to the signatures branch
      pull-requests: write # contributor-assistant comments on the PR
      statuses: write # CLA status check
    steps:
      - name: Check contributor agreement # zizmor: ignore[archived-uses] owner-approved drawover CLA port
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          path-to-signatures: signatures/version1/cla.json
          path-to-document: https://github.com/janiorvalle/tokenomnom/blob/main/CONTRIBUTING.md
          branch: signatures
          allowlist: janiorvalle,dependabot[bot],*[bot]
